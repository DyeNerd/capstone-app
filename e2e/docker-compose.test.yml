version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: badminton_postgres_test
    environment:
      POSTGRES_DB: badminton_training_test
      POSTGRES_USER: badminton_user
      POSTGRES_PASSWORD: badminton_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton_user -d badminton_training_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - badminton_test_network

  redis:
    image: redis:7-alpine
    container_name: badminton_redis_test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - badminton_test_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: badminton_rabbitmq_test
    environment:
      RABBITMQ_DEFAULT_USER: badminton
      RABBITMQ_DEFAULT_PASS: badminton123
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - badminton_test_network

  api:
    image: node:18-alpine
    container_name: badminton_api_test
    working_dir: /app
    volumes:
      - ../badminton-backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: test
      PORT: 5001
      DATABASE_URL: postgresql://badminton_user:badminton_pass@postgres:5432/badminton_training_test
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://badminton:badminton123@rabbitmq:5672
      JWT_SECRET: test-secret-key-e2e-testing
      FRONTEND_URL: http://localhost:3001
    ports:
      - "5001:5001"
    command: sh -c "npm install && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 3s
      timeout: 5s
      retries: 15
    networks:
      - badminton_test_network

networks:
  badminton_test_network:
    driver: bridge
