version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: badminton_postgres
    environment:
      POSTGRES_USER: badminton_user
      POSTGRES_PASSWORD: badminton_pass
      POSTGRES_DB: badminton_training
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - badminton_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: badminton_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - badminton_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: badminton_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: badminton
      RABBITMQ_DEFAULT_PASS: badminton123
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - badminton_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # Express.js Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: badminton_api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://badminton_user:badminton_pass@postgres:5432/badminton_training
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://badminton:badminton123@rabbitmq:5672
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - badminton_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  badminton_network:
    driver: bridge

